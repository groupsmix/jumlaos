services:
  postgres:
    image: postgres:16-alpine
    container_name: jumlaos-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: jumlaos
      POSTGRES_PASSWORD: jumlaos
      POSTGRES_DB: jumlaos
    ports:
      - "5432:5432"
    volumes:
      - jumlaos-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jumlaos -d jumlaos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: jumlaos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jumlaos-pg:
