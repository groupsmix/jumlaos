# Fly.io config for JumlaOS Procrastinate workers.
# Primary region: cdg. Failover region: ams (set via flyctl scale count).

app            = "jumlaos-worker"
primary_region = "cdg"

[build]
  dockerfile = "../../apps/api/Dockerfile"

[env]
  JUMLAOS_ENV     = "prod"
  JUMLAOS_ROLE    = "worker"
  JUMLAOS_LOG_LEVEL = "INFO"

[processes]
  worker = "uv run python -m jumlaos.workers.entrypoint"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# F12 — exec health check on the worker process. Fly will SIGTERM and
# replace the VM if the worker process is no longer alive. The grace
# period gives Procrastinate time to connect to Postgres on a cold start.
[[services]]
  processes = ["worker"]

  [[services.checks]]
    type     = "exec"
    interval = "30s"
    timeout  = "10s"
    grace_period = "60s"
    command = ["sh", "-c", "pgrep -f jumlaos.workers.entrypoint > /dev/null"]

[[scaling]]
  processes = ["worker"]
  min_machines = 2
  max_machines = 4

[deploy]
  strategy = "rolling"
